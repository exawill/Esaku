<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Esaku — Sign in</title>
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/styles.css" />
    <script src="/js/theme.js"></script>
  </head>
  <body class="font-sans min-h-screen flex flex-col">
    <header class="sticky top-0 z-30 backdrop-blur bg-cream-50/80 dark:bg-ink-900/80 border-b border-ink-900/5 dark:border-cream-100/5">
      <div class="mx-auto max-w-7xl px-6 h-16 flex items-center justify-between">
        <a href="/" class="flex items-center gap-2 font-display font-bold text-lg">
          <span class="inline-flex h-8 w-8 items-center justify-center rounded-xl bg-ink-900 text-cream-50 dark:bg-cream-100 dark:text-ink-900">e</span>
          Esaku
        </a>
        <div class="flex items-center gap-2">
          <button id="lang-toggle" class="btn-ghost" aria-label="Toggle language" title="Language">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            <span id="lang-label" class="text-xs font-semibold">EN</span>
          </button>
          <button id="theme-toggle" class="btn-ghost" aria-label="Toggle theme" title="Theme">
            <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
            <svg id="icon-moon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
        </div>
      </div>
    </header>

    <main class="flex-1 flex items-center justify-center px-6 py-12">
      <div class="card w-full max-w-md p-8">
        <h1 id="auth-title" class="font-display font-bold text-2xl" data-i18n="auth.signin_title">Welcome back</h1>
        <p class="mt-1 text-sm text-ink-600 dark:text-cream-200">Esaku · QRIS Payment Gateway</p>

        <form id="auth-form" class="mt-6 space-y-4">
          <div id="name-field" class="hidden">
            <label class="label" data-i18n="auth.name">Full name</label>
            <input type="text" name="name" class="input" autocomplete="name" />
          </div>
          <div>
            <label class="label" data-i18n="auth.email">Email</label>
            <input type="email" name="email" class="input" required autocomplete="email" />
          </div>
          <div>
            <label class="label" data-i18n="auth.password">Password</label>
            <input type="password" name="password" class="input" required autocomplete="current-password" minlength="8" />
          </div>
          <button id="submit-btn" type="submit" class="btn-primary w-full justify-center" data-i18n="auth.signin_btn">Sign in</button>
        </form>

        <div class="my-6 flex items-center gap-3 text-xs text-ink-600 dark:text-cream-200">
          <span class="flex-1 h-px bg-ink-900/10 dark:bg-cream-100/10"></span>
          <span data-i18n="auth.or">or</span>
          <span class="flex-1 h-px bg-ink-900/10 dark:bg-cream-100/10"></span>
        </div>

        <a href="/api/auth/hostinger" class="btn-secondary w-full justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12c0-5 4-9 9-9s9 4 9 9-4 9-9 9-9-4-9-9z"/><path d="M3 12h18"/></svg>
          <span data-i18n="auth.hostinger">Continue with Hostinger</span>
        </a>

        <div class="mt-6 text-center text-sm">
          <a id="toggle-link" href="/sign-up" class="nav-link" data-i18n="auth.toggle_signup">Don't have an account? Sign up</a>
        </div>
      </div>
    </main>

    <script src="/js/i18n.js"></script>
    <script src="/js/common.js"></script>
    <script>
      (function () {
        const path = window.location.pathname;
        const isSignUp = path === "/sign-up";

        function applyMode() {
          const title = document.getElementById("auth-title");
          const submit = document.getElementById("submit-btn");
          const toggle = document.getElementById("toggle-link");
          const nameField = document.getElementById("name-field");
          if (isSignUp) {
            title.setAttribute("data-i18n", "auth.signup_title");
            submit.setAttribute("data-i18n", "auth.signup_btn");
            toggle.setAttribute("data-i18n", "auth.toggle_signin");
            toggle.href = "/sign-in";
            nameField.classList.remove("hidden");
          } else {
            title.setAttribute("data-i18n", "auth.signin_title");
            submit.setAttribute("data-i18n", "auth.signin_btn");
            toggle.setAttribute("data-i18n", "auth.toggle_signup");
            toggle.href = "/sign-up";
            nameField.classList.add("hidden");
          }
          window.i18n.apply();
        }
        applyMode();

        document.getElementById("auth-form").addEventListener("submit", async (ev) => {
          ev.preventDefault();
          const fd = new FormData(ev.currentTarget);
          const body = {
            email: fd.get("email"),
            password: fd.get("password")
          };
          if (isSignUp) body.name = fd.get("name") || null;
          try {
            const res = await app.api(
              isSignUp ? "/api/auth/sign-up" : "/api/auth/sign-in",
              { method: "POST", body }
            );
            const role = res.user?.role;
            window.location.href = role === "admin" ? "/admin" : "/dashboard";
          } catch (err) {
            app.showToast(err.message, "error");
          }
        });
      })();
    </script>
  </body>
</html>
