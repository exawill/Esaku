<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Esaku — Dashboard</title>
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/styles.css" />
    <script src="/js/theme.js"></script>
  </head>
  <body class="font-sans">
    <div id="app-root"></div>

    <template id="page-template">
      <div class="space-y-6">
        <div class="card p-6 lg:p-8">
          <div class="flex flex-wrap items-center justify-between gap-4">
            <div>
              <p class="text-xs uppercase tracking-wider text-ink-600 dark:text-cream-200" data-i18n="common.balance">Balance</p>
              <p id="balance" class="font-display font-bold text-3xl">—</p>
            </div>
            <div class="inline-flex rounded-2xl border border-ink-900/10 dark:border-cream-100/10 p-1" id="range-toggle">
              <button data-range="7" class="px-3 py-1.5 rounded-xl text-sm font-medium" data-i18n="common.range_7">7 days</button>
              <button data-range="30" class="px-3 py-1.5 rounded-xl text-sm font-medium" data-i18n="common.range_30">30 days</button>
              <button data-range="90" class="px-3 py-1.5 rounded-xl text-sm font-medium" data-i18n="common.range_90">90 days</button>
            </div>
          </div>

          <div class="mt-6">
            <div class="flex items-end gap-1.5 h-56" id="chart"></div>
            <div class="mt-2 flex justify-between text-xs text-ink-600 dark:text-cream-200" id="chart-axis"></div>
          </div>

          <div class="mt-6 grid sm:grid-cols-3 gap-3 text-sm">
            <div class="rounded-2xl bg-cream-200 dark:bg-ink-700 p-4">
              <p class="text-xs text-ink-600 dark:text-cream-200">Inflow</p>
              <p id="stat-in" class="mt-1 font-display font-bold text-lg">—</p>
            </div>
            <div class="rounded-2xl bg-cream-200 dark:bg-ink-700 p-4">
              <p class="text-xs text-ink-600 dark:text-cream-200">Outflow</p>
              <p id="stat-out" class="mt-1 font-display font-bold text-lg">—</p>
            </div>
            <div class="rounded-2xl bg-cream-200 dark:bg-ink-700 p-4">
              <p class="text-xs text-ink-600 dark:text-cream-200">QRIS count</p>
              <p id="stat-count" class="mt-1 font-display font-bold text-lg">—</p>
            </div>
          </div>
        </div>

        <div class="grid sm:grid-cols-3 gap-4">
          <a href="/generate-qris" class="card p-5 hover:shadow-soft hover:-translate-y-0.5 transition">
            <p class="font-semibold" data-i18n="qris.title">Generate QRIS</p>
            <p class="text-xs text-ink-600 dark:text-cream-200 mt-1" data-i18n="qris.fee_note">A flat 0.7% fee is deducted on payment.</p>
          </a>
          <a href="/withdrawal" class="card p-5 hover:shadow-soft hover:-translate-y-0.5 transition">
            <p class="font-semibold" data-i18n="wd.title">Withdrawal</p>
            <p class="text-xs text-ink-600 dark:text-cream-200 mt-1" data-i18n="wd.min_note">Minimum withdrawal: IDR 50,000</p>
          </a>
          <a href="/transactions" class="card p-5 hover:shadow-soft hover:-translate-y-0.5 transition">
            <p class="font-semibold" data-i18n="tx.title">Transactions</p>
            <p class="text-xs text-ink-600 dark:text-cream-200 mt-1">View history</p>
          </a>
        </div>
      </div>
    </template>

    <div id="page-content" class="hidden"></div>

    <script src="/js/i18n.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/shell.js"></script>
    <script>
      (async function () {
        const tpl = document.getElementById("page-template").content.cloneNode(true);
        document.getElementById("page-content").appendChild(tpl);

        const user = await shell.mount({ pageTitleKey: "side.dashboard" });
        if (!user) return;

        let currentRange = 7;

        function renderChart(series) {
          const chart = document.getElementById("chart");
          const axis = document.getElementById("chart-axis");
          chart.innerHTML = "";
          axis.innerHTML = "";
          const max = Math.max(1, ...series.map((p) => p.inflow));
          for (const point of series) {
            const h = (point.inflow / max) * 100;
            const bar = document.createElement("div");
            bar.className = "flex-1 rounded-t-2xl bg-ink-900 dark:bg-cream-100 transition-all relative group";
            bar.style.height = `${Math.max(2, h)}%`;
            bar.title = `${point.day}\n${app.formatIDR(point.inflow)}`;
            chart.appendChild(bar);
          }
          // axis labels: first/last day
          const first = series[0]?.day || "";
          const last = series[series.length - 1]?.day || "";
          axis.innerHTML = `<span>${first}</span><span>${last}</span>`;
        }

        async function load(range) {
          currentRange = range;
          // toggle styles
          document.querySelectorAll("#range-toggle button").forEach((btn) => {
            const active = Number(btn.dataset.range) === range;
            btn.classList.toggle("bg-ink-900", active);
            btn.classList.toggle("text-cream-50", active);
            btn.classList.toggle("dark:bg-cream-100", active);
            btn.classList.toggle("dark:text-ink-900", active);
          });
          try {
            const data = await app.api(`/api/dashboard/summary?days=${range}`);
            document.getElementById("balance").textContent = app.formatIDR(data.balance);
            document.getElementById("stat-in").textContent = app.formatIDR(data.totals.inflow);
            document.getElementById("stat-out").textContent = app.formatIDR(data.totals.outflow);
            document.getElementById("stat-count").textContent = data.totals.qris_count;
            renderChart(data.series);
          } catch (err) {
            app.showToast(err.message, "error");
          }
        }

        document.querySelectorAll("#range-toggle button").forEach((btn) => {
          btn.addEventListener("click", () => load(Number(btn.dataset.range)));
        });

        load(7);
      })();
    </script>
  </body>
</html>
