<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Esaku — Generate QRIS</title>
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/styles.css" />
    <script src="/js/theme.js"></script>
  </head>
  <body class="font-sans">
    <div id="app-root"></div>

    <template id="page-template">
      <div class="grid lg:grid-cols-2 gap-6">
        <div class="card p-6 lg:p-8">
          <h2 class="font-display text-xl font-bold" data-i18n="qris.title">Generate QRIS</h2>
          <p class="text-sm text-ink-600 dark:text-cream-200 mt-1" data-i18n="qris.fee_note">A flat 0.7% fee is deducted on payment.</p>
          <form id="qris-form" class="mt-6 space-y-4">
            <div>
              <label class="label" data-i18n="qris.amount_label">Amount (IDR)</label>
              <input type="number" name="amount" min="1000" step="1000" class="input" required placeholder="50000" />
            </div>
            <button type="submit" class="btn-primary w-full justify-center" data-i18n="qris.create">Create QRIS</button>
          </form>
        </div>

        <div class="card p-6 lg:p-8">
          <div id="qris-empty" class="h-full flex flex-col items-center justify-center text-center text-ink-600 dark:text-cream-200">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="opacity-40"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h3v3h-3z"/><path d="M20 14v7"/><path d="M14 20h6"/></svg>
            <p class="mt-3 text-sm">Enter an amount to generate a QRIS code.</p>
          </div>
          <div id="qris-result" class="hidden">
            <div class="flex items-start justify-between">
              <div>
                <p class="text-xs uppercase tracking-wider text-ink-600 dark:text-cream-200">QRIS · Esaku</p>
                <p id="result-amount" class="mt-1 font-display text-2xl font-bold">—</p>
              </div>
              <span class="pill bg-emerald-100 text-emerald-800 dark:bg-emerald-800/30 dark:text-emerald-300" id="result-status">pending</span>
            </div>
            <img id="result-qr" alt="QRIS" class="mt-5 w-full aspect-square rounded-2xl bg-cream-50 dark:bg-ink-700 p-4 object-contain" />
            <div class="mt-5 grid grid-cols-2 gap-4 text-sm">
              <div>
                <p class="text-ink-600 dark:text-cream-200" data-i18n="qris.expires">Expires in</p>
                <p id="result-countdown" class="font-semibold">--:--</p>
              </div>
              <div>
                <p class="text-ink-600 dark:text-cream-200">Net amount</p>
                <p id="result-net" class="font-semibold">—</p>
              </div>
              <div class="col-span-2">
                <p class="text-ink-600 dark:text-cream-200">Reference</p>
                <p id="result-ref" class="font-mono text-xs break-all">—</p>
              </div>
            </div>
            <div class="mt-5 flex gap-2">
              <button id="copy-payload" class="btn-secondary flex-1" data-i18n="common.copy">Copy</button>
              <button id="mock-pay" class="btn-primary flex-1">Simulate paid</button>
            </div>
          </div>
        </div>
      </div>
    </template>

    <div id="page-content" class="hidden"></div>

    <script src="/js/i18n.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/shell.js"></script>
    <script>
      (async function () {
        const tpl = document.getElementById("page-template").content.cloneNode(true);
        document.getElementById("page-content").appendChild(tpl);

        const user = await shell.mount({ pageTitleKey: "side.qris" });
        if (!user) return;

        let countdownTimer = null;
        let activeOrder = null;

        function startCountdown(expiresAt) {
          clearInterval(countdownTimer);
          const expires = new Date(expiresAt).getTime();
          const el = document.getElementById("result-countdown");
          function tick() {
            const remain = Math.max(0, Math.floor((expires - Date.now()) / 1000));
            const m = String(Math.floor(remain / 60)).padStart(2, "0");
            const s = String(remain % 60).padStart(2, "0");
            el.textContent = `${m}:${s}`;
            if (remain <= 0) {
              clearInterval(countdownTimer);
              document.getElementById("result-status").textContent = "expired";
            }
          }
          tick();
          countdownTimer = setInterval(tick, 1000);
        }

        function showOrder(order) {
          activeOrder = order;
          document.getElementById("qris-empty").classList.add("hidden");
          document.getElementById("qris-result").classList.remove("hidden");
          document.getElementById("result-amount").textContent = app.formatIDR(order.amount);
          document.getElementById("result-net").textContent = app.formatIDR(order.net_amount);
          document.getElementById("result-ref").textContent = order.reference;
          document.getElementById("result-status").textContent = order.status;
          document.getElementById("result-qr").src = order.qr_image;
          startCountdown(order.expires_at);
        }

        document.getElementById("qris-form").addEventListener("submit", async (ev) => {
          ev.preventDefault();
          const fd = new FormData(ev.currentTarget);
          try {
            const res = await app.api("/api/qris", {
              method: "POST",
              body: { amount: Number(fd.get("amount")) }
            });
            showOrder(res.order);
          } catch (err) {
            app.showToast(err.message, "error");
          }
        });

        document.getElementById("copy-payload").addEventListener("click", async () => {
          if (!activeOrder) return;
          await navigator.clipboard.writeText(activeOrder.qr_payload);
          app.showToast(window.i18n.t("common.copied"), "success");
        });

        document.getElementById("mock-pay").addEventListener("click", async () => {
          if (!activeOrder) return;
          try {
            await app.api(`/api/qris/${activeOrder.id}/mock-pay`, { method: "POST" });
            document.getElementById("result-status").textContent = "paid";
            app.showToast("Marked as paid", "success");
          } catch (err) {
            app.showToast(err.message, "error");
          }
        });
      })();
    </script>
  </body>
</html>
