<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Esaku — Withdrawal</title>
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/styles.css" />
    <script src="/js/theme.js"></script>
  </head>
  <body class="font-sans">
    <div id="app-root"></div>

    <template id="page-template">
      <div class="grid lg:grid-cols-3 gap-6">
        <div class="card p-6 lg:p-8 lg:col-span-1">
          <h2 class="font-display text-xl font-bold" data-i18n="wd.title">Withdrawal</h2>
          <p class="text-sm text-ink-600 dark:text-cream-200 mt-1" data-i18n="wd.min_note">Minimum withdrawal: IDR 50,000</p>

          <form id="wd-form" class="mt-6 space-y-4">
            <div>
              <label class="label" data-i18n="wd.method">Method</label>
              <div class="grid grid-cols-2 gap-2" id="method-toggle">
                <button type="button" data-method="bank" class="rounded-2xl border border-ink-900/10 dark:border-cream-100/10 px-3 py-2 text-sm font-medium" data-i18n="wd.bank">Bank Transfer</button>
                <button type="button" data-method="ewallet" class="rounded-2xl border border-ink-900/10 dark:border-cream-100/10 px-3 py-2 text-sm font-medium" data-i18n="wd.ewallet">E-Wallet</button>
              </div>
              <input type="hidden" name="method" value="bank" />
              <p id="fee-note" class="text-xs text-ink-600 dark:text-cream-200 mt-2" data-i18n="wd.fee_note_bank">Bank transfer fee: IDR 6,500</p>
            </div>
            <div>
              <label class="label" data-i18n="wd.dest">Account / phone number</label>
              <input type="text" name="destination" class="input" required />
            </div>
            <div>
              <label class="label" data-i18n="wd.amount">Amount (IDR)</label>
              <input type="number" name="amount" min="50000" step="1000" class="input" required placeholder="50000" />
              <p id="total-note" class="text-xs text-ink-600 dark:text-cream-200 mt-2"></p>
            </div>
            <button type="submit" class="btn-primary w-full justify-center" data-i18n="wd.submit">Request withdrawal</button>
          </form>
        </div>

        <div class="card p-6 lg:p-8 lg:col-span-2">
          <h3 class="font-semibold">History</h3>
          <div class="mt-4 overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="text-left text-xs uppercase tracking-wider text-ink-600 dark:text-cream-200">
                <tr>
                  <th class="py-2" data-i18n="common.date">Date</th>
                  <th class="py-2" data-i18n="wd.method">Method</th>
                  <th class="py-2" data-i18n="common.amount">Amount</th>
                  <th class="py-2">Fee</th>
                  <th class="py-2" data-i18n="common.status">Status</th>
                </tr>
              </thead>
              <tbody id="wd-rows"></tbody>
            </table>
          </div>
        </div>
      </div>
    </template>

    <div id="page-content" class="hidden"></div>

    <script src="/js/i18n.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/shell.js"></script>
    <script>
      (async function () {
        const tpl = document.getElementById("page-template").content.cloneNode(true);
        document.getElementById("page-content").appendChild(tpl);

        const user = await shell.mount({ pageTitleKey: "side.withdrawal" });
        if (!user) return;

        const fees = (await app.api("/api/withdrawal/quote")).fees;

        function pickMethod(method) {
          document.querySelector('input[name="method"]').value = method;
          document.querySelectorAll("#method-toggle button").forEach((b) => {
            const active = b.dataset.method === method;
            b.classList.toggle("bg-ink-900", active);
            b.classList.toggle("text-cream-50", active);
            b.classList.toggle("dark:bg-cream-100", active);
            b.classList.toggle("dark:text-ink-900", active);
          });
          document.getElementById("fee-note").setAttribute(
            "data-i18n",
            method === "bank" ? "wd.fee_note_bank" : "wd.fee_note_ewallet"
          );
          window.i18n.apply();
          updateTotal();
        }
        document.querySelectorAll("#method-toggle button").forEach((btn) => {
          btn.addEventListener("click", () => pickMethod(btn.dataset.method));
        });
        pickMethod("bank");

        function updateTotal() {
          const method = document.querySelector('input[name="method"]').value;
          const amt = Number(document.querySelector('input[name="amount"]').value || 0);
          const fee = method === "bank" ? fees.bank : fees.ewallet;
          const total = amt + fee;
          document.getElementById("total-note").textContent =
            `Fee ${app.formatIDR(fee)} · Total debit ${app.formatIDR(total)}`;
        }
        document.querySelector('input[name="amount"]').addEventListener("input", updateTotal);

        async function loadHistory() {
          const data = await app.api("/api/withdrawal");
          const tbody = document.getElementById("wd-rows");
          tbody.innerHTML = "";
          if (!data.withdrawals.length) {
            tbody.innerHTML = `<tr><td colspan="5" class="py-6 text-center text-ink-600 dark:text-cream-200">No withdrawals yet.</td></tr>`;
            return;
          }
          for (const w of data.withdrawals) {
            const tr = document.createElement("tr");
            tr.className = "border-t border-ink-900/5 dark:border-cream-100/5";
            tr.innerHTML = `
              <td class="py-3">${app.formatDate(w.created_at)}</td>
              <td class="py-3">${w.method === "bank" ? "Bank" : "E-Wallet"} <span class="text-xs text-ink-600 dark:text-cream-200">· ${w.destination}</span></td>
              <td class="py-3">${app.formatIDR(w.amount)}</td>
              <td class="py-3">${app.formatIDR(w.fee)}</td>
              <td class="py-3"><span class="pill">${w.status}</span></td>
            `;
            tbody.appendChild(tr);
          }
        }
        loadHistory();

        document.getElementById("wd-form").addEventListener("submit", async (ev) => {
          ev.preventDefault();
          const fd = new FormData(ev.currentTarget);
          try {
            await app.api("/api/withdrawal", {
              method: "POST",
              body: {
                method: fd.get("method"),
                destination: fd.get("destination"),
                amount: Number(fd.get("amount"))
              }
            });
            app.showToast("Withdrawal requested", "success");
            ev.currentTarget.reset();
            pickMethod("bank");
            loadHistory();
          } catch (err) {
            app.showToast(err.message, "error");
          }
        });
      })();
    </script>
  </body>
</html>
