<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Esaku — Masuk / Daftar</title>
<link rel="icon" href="/assets/favicon.svg" type="image/svg+xml"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/css/app.css"/>
</head>
<body>
<div class="auth-shell">
  <div class="auth-top">
    <a href="/" class="nav-logo">
      <svg width="24" height="24" viewBox="0 0 80 80" fill="none">
        <rect x="8" y="8" width="56" height="56" rx="10" transform="rotate(8 40 40)" fill="#141210"/>
        <text x="14" y="58" font-family="Georgia,serif" font-size="52" font-weight="bold" fill="white" font-style="italic">e</text>
        <path d="M26 62 Q38 74 54 66 Q64 60 58 50" stroke="#2d22c8" stroke-width="5" fill="none" stroke-linecap="round"/>
      </svg>
      <span>Esaku</span>
    </a>
    <div class="row">
      <a href="/" class="btn btn-outline btn-sm">← Beranda</a>
      <a href="/demo" class="btn btn-dark btn-sm">Coba Demo</a>
    </div>
  </div>

  <main class="auth-main">
    <div class="auth-card">
      <div class="auth-tabs" role="tablist">
        <button class="auth-tab" id="tab-signin" role="tab">Masuk</button>
        <button class="auth-tab" id="tab-signup" role="tab">Daftar</button>
      </div>

      <h1 id="auth-title" style="font-size:22px;font-weight:800;letter-spacing:-0.025em">Masuk ke akun Anda</h1>
      <p class="text-mid" style="font-size:13px;margin-top:4px">QRIS Merchant perorangan · MDR 0,7% flat · Tanpa KYC</p>

      <form id="auth-form" class="stack mt-6" autocomplete="on">
        <!-- Honeypot field: hidden from humans, irresistible to naive bots. -->
        <div aria-hidden="true" style="position:absolute;left:-10000px;width:1px;height:1px;overflow:hidden">
          <label for="f-website">Situs (jangan diisi)</label>
          <input id="f-website" name="website" type="text" tabindex="-1" autocomplete="off"/>
        </div>
        <div class="field" id="name-field" style="display:none">
          <label class="label" for="f-name">Nama Lengkap</label>
          <input id="f-name" class="input" name="name" type="text" autocomplete="name"/>
        </div>
        <div class="field">
          <label class="label" for="f-email">Email</label>
          <input id="f-email" class="input" name="email" type="email" required autocomplete="email" placeholder="email@bisnisanda.com"/>
        </div>
        <div class="field">
          <label class="label" for="f-pass">Kata Sandi</label>
          <input id="f-pass" class="input" name="password" type="password" required minlength="8" autocomplete="current-password" placeholder="Min. 8 karakter"/>
        </div>
        <button id="submit-btn" type="submit" class="btn btn-dark btn-block">Masuk</button>
      </form>

      <div class="auth-divider">atau</div>

      <a href="/api/auth/hostinger" class="btn btn-outline btn-block">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        Lanjutkan dengan Hostinger
      </a>

      <div class="text-mid mt-6" style="font-size:12px;text-align:center">
        <span id="toggle-text"></span>
        <button type="button" id="toggle-btn" class="btn-ghost" style="font-size:12px;font-weight:700">Daftar di sini</button>
      </div>
    </div>
  </main>
</div>

<script src="/js/common.js"></script>
<script>
(function () {
  const isSignUp = window.location.pathname === "/sign-up";

  const dom = {
    title:  document.getElementById("auth-title"),
    submit: document.getElementById("submit-btn"),
    nameF:  document.getElementById("name-field"),
    tabSi:  document.getElementById("tab-signin"),
    tabSu:  document.getElementById("tab-signup"),
    toggleT:document.getElementById("toggle-text"),
    toggleB:document.getElementById("toggle-btn"),
    pass:   document.getElementById("f-pass")
  };

  function applyMode() {
    if (isSignUp) {
      dom.title.textContent = "Buat akun Esaku";
      dom.submit.textContent = "Buat Akun";
      dom.nameF.style.display = "";
      dom.tabSi.classList.remove("is-active");
      dom.tabSu.classList.add("is-active");
      dom.toggleT.textContent = "Sudah punya akun? ";
      dom.toggleB.textContent = "Masuk di sini";
      dom.toggleB.onclick = () => (window.location.href = "/sign-in");
      dom.pass.setAttribute("autocomplete", "new-password");
    } else {
      dom.title.textContent = "Masuk ke akun Anda";
      dom.submit.textContent = "Masuk";
      dom.nameF.style.display = "none";
      dom.tabSi.classList.add("is-active");
      dom.tabSu.classList.remove("is-active");
      dom.toggleT.textContent = "Belum punya akun? ";
      dom.toggleB.textContent = "Daftar di sini";
      dom.toggleB.onclick = () => (window.location.href = "/sign-up");
      dom.pass.setAttribute("autocomplete", "current-password");
    }
  }
  dom.tabSi.onclick = () => (window.location.href = "/sign-in");
  dom.tabSu.onclick = () => (window.location.href = "/sign-up");
  applyMode();

  document.getElementById("auth-form").addEventListener("submit", async (ev) => {
    ev.preventDefault();
    const fd = new FormData(ev.currentTarget);
    const body = {
      email: fd.get("email"),
      password: fd.get("password"),
      website: fd.get("website") || ""
    };
    if (isSignUp) body.name = (fd.get("name") || "").toString().trim() || null;
    dom.submit.disabled = true;
    dom.submit.textContent = "Memproses...";
    try {
      const res = await app.api(isSignUp ? "/api/auth/sign-up" : "/api/auth/sign-in", { method: "POST", body });
      window.location.href = res.user?.role === "admin" ? "/admin" : "/dashboard";
    } catch (err) {
      app.showToast(err.message, "error");
      dom.submit.disabled = false;
      dom.submit.textContent = isSignUp ? "Buat Akun" : "Masuk";
    }
  });

  // Surface OAuth callback errors (e.g. device already used)
  const params = new URLSearchParams(window.location.search);
  if (params.get("err") === "device_used") {
    app.showToast("Akun sudah pernah dibuat dari peramban ini. Silakan masuk.", "error");
  }
})();
</script>
</body>
</html>
